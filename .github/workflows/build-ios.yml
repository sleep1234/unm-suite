name: Build iOS Tweak

on:
  push:
    branches: [ main, master ]
    paths:
      - 'ios/**'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'ios/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-ios:
    name: iOS Tweak (UNMHook)
    runs-on: macos-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Build dylib (pure ObjC, no Theos needed)
        run: |
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          mkdir -p build

          echo "SDK: $SDK"
          echo "Compiling Tweak.x -> UNMHook.dylib"

          # Step 1: Compile ObjC source (clang needs .m extension to recognize ObjC)
          cp ios/UNMHook/Tweak.x build/Tweak.m

          clang \
            -c \
            -arch arm64 \
            -isysroot "$SDK" \
            -miphoneos-version-min=14.0 \
            -fobjc-arc \
            -fobjc-weak \
            -fmodules \
            -o build/Tweak.o \
            build/Tweak.m

          # Step 2: Link into dylib
          clang++ \
            -dynamiclib \
            -arch arm64 \
            -isysroot "$SDK" \
            -miphoneos-version-min=14.0 \
            -framework Foundation \
            -framework UIKit \
            -install_name "@rpath/libUNMHook.dylib" \
            -o build/UNMHook.dylib \
            build/Tweak.o

          echo "=== Build result ==="
          file build/UNMHook.dylib
          ls -la build/UNMHook.dylib
          codesign -dv build/UNMHook.dylib 2>&1 || true

      - name: Upload dylib artifact
        uses: actions/upload-artifact@v4
        with:
          name: UNMHook-dylib
          path: build/UNMHook.dylib

      - name: Create Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ios-v2.0.0
          name: "UNMHook v2.0.0 (Native Mode)"
          body: |
            UNMHook v2.0.0 - Native music URL injection, no Node.js/proxy needed.
            
            ## Installation
            ### TrollStore (recommended)
            1. Download UNMHook.dylib
            2. Use inject tool to inject into NeteaseMusic
            3. Kill and restart the app
            
            ### Jailbreak
            1. Copy UNMHook.dylib to /Library/MobileSubstrate/DynamicLibraries/
            2. Copy UNMHook.plist alongside
            3. killall NeteaseMusic
          files: build/UNMHook.dylib
          draft: false
          prerelease: false
