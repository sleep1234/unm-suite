name: Build iOS Tweak

on:
  push:
    branches: [ main, master ]
    paths:
      - 'ios/**'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'ios/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-ios:
    name: iOS Tweak (UNMHook)
    runs-on: macos-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Build dylib with Theos/Logos
        run: |
          # Install Theos (we only need the logos preprocessor + substrate headers)
          export THEOS=$(mktemp -d)/theos
          git clone --depth 1 https://github.com/theos/theos.git "$THEOS"
          export PATH="$THEOS/bin:$PATH"

          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          echo "SDK: $SDK"
          echo "THEOS: $THEOS"

          mkdir -p build

          # logos.pl preprocesses %hook/%orig Logos syntax -> plain ObjC
          # Then clang compiles to dylib
          "$THEOS/bin/logos" ios/UNMHook/Tweak.x > build/Tweak.mm 2>/dev/null || \
          perl "$THEOS/bin/logos.pl" ios/UNMHook/Tweak.x > build/Tweak.mm

          echo "=== Preprocessed output (first 50 lines) ==="
          head -50 build/Tweak.mm

          # Compile the preprocessed .mm to dylib
          clang++ \
            -dynamiclib \
            -arch arm64 \
            -isysroot "$SDK" \
            -framework Foundation \
            -framework UIKit \
            -fobjc-arc \
            -fmodules \
            -std=c++17 \
            -I"$THEOS/vendor/include" \
            -I"$THEOS/include" \
            -install_name "@r/libUNMHook.dylib" \
            -o build/UNMHook.dylib \
            build/Tweak.mm

          echo "Build successful!"
          file build/UNMHook.dylib
          ls -la build/UNMHook.dylib

      - name: Upload dylib artifact
        uses: actions/upload-artifact@v4
        with:
          name: UNMHook-dylib
          path: build/UNMHook.dylib

      - name: Copy dylib for release
        run: cp build/UNMHook.dylib ios/UNMHook/UNMHook.dylib

      - name: Create Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ios-v2.0.0
          name: "UNMHook v2.0.0 (Native Mode)"
          body: |
            UNMHook v2.0.0 - Native music URL injection, no Node.js/proxy needed.
            
            ## What's New
            - Completely rewritten from proxy mode to native ObjC hook
            - Hooks NSURLSession to intercept player URL responses
            - Queries GD studio API (pyncmd source) for grayed-out songs
            - Injects real music URL directly into response JSON
            - No external dependencies - pure native implementation
            
            ## Installation
            ### TrollStore (recommended)
            1. Download `UNMHook.dylib`
            2. Use TrollStore Helper or inserttool to inject into 网易云音乐
            3. Kill and restart 网易云音乐
            
            ### Jailbreak
            1. Download `UNMHook.dylib`
            2. Copy to /Library/MobileSubstrate/DynamicLibraries/ on device
            3. Copy UNMHook.plist alongside
            4. Kill app: `killall NeteaseMusic`
          files: build/UNMHook.dylib
          draft: false
          prerelease: false
