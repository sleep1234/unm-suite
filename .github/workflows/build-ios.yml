name: Build iOS Tweak

on:
  push:
    branches: [ main, master ]
    paths:
      - 'ios/**'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'ios/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-ios:
    name: iOS Tweak (UNMHook)
    runs-on: macos-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Install Theos
        run: |
          export THEOS=$HOME/theos
          git clone --recursive https://github.com/theos/theos.git $THEOS
          echo "THEOS=$THEOS" >> $GITHUB_ENV

      - name: Set up iOS SDK
        run: |
          # Create SDK directory structure
          export THEOS=$HOME/theos
          mkdir -p $THEOS/sdks
          # Download iPhoneOS SDK from Xcode
          SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path 2>/dev/null || echo "")
          if [ -n "$SDK_PATH" ] && [ -d "$SDK_PATH" ]; then
            echo "Using Xcode SDK: $SDK_PATH"
            ln -sf "$SDK_PATH" $THEOS/sdks/iPhoneOS.sdk
          else
            echo "No Xcode SDK found"
            exit 1
          fi

      - name: Build Tweak
        run: |
          export THEOS=$HOME/theos
          cd ios/UNMHook
          make clean
          make package FINALPACKAGE=1

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: UNMHook-deb
          path: ios/UNMHook/packages/*.deb

      - name: Extract and upload dylib
        run: |
          cd ios/UNMHook
          DEB_FILE=$(ls packages/*.deb | head -1)
          if [ -n "$DEB_FILE" ]; then
            mkdir -p extracted
            dpkg-deb -x "$DEB_FILE" extracted/
            DYLIB=$(find extracted -name "*.dylib" | head -1)
            if [ -n "$DYLIB" ]; then
              cp "$DYLIB" UNMHook.dylib
              echo "DYLIB_PATH=ios/UNMHook/UNMHook.dylib" >> $GITHUB_ENV
            fi
          fi

      - name: Upload dylib artifact
        uses: actions/upload-artifact@v4
        with:
          name: UNMHook-dylib
          path: ios/UNMHook/UNMHook.dylib

      - name: Create Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ios-v2.0.0
          name: "UNMHook v2.0.0 (Native Mode)"
          body: |
            UNMHook v2.0.0 - Native music URL injection, no Node.js/proxy needed.
            
            ## What's New
            - Completely rewritten from proxy mode to native ObjC hook
            - Hooks NSURLSession to intercept player URL responses
            - Queries GD studio API (pyncmd source) for grayed-out songs
            - Injects real music URL directly into response JSON
            - No external dependencies - pure native implementation
            
            ## Installation
            ### TrollStore (recommended)
            1. Download `UNMHook.dylib`
            2. Use TrollStore Helper or inserttool to inject into 网易云音乐
            3. Kill and restart 网易云音乐
            
            ### Jailbreak
            1. Download `UNMHook-*.deb`
            2. Install via Sileo/Filza: `dpkg -i UNMHook_*.deb`
            3. Kill app: `killall NeteaseMusic`
          files: |
            ios/UNMHook/packages/*.deb
            ios/UNMHook/UNMHook.dylib
          draft: false
          prerelease: false
