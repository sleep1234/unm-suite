name: Build iOS Tweak

on:
  push:
    branches: [ main, master ]
    paths:
      - 'ios/**'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'ios/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-ios:
    name: iOS Tweak (UNMHook)
    runs-on: macos-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Install Theos (logos preprocessor only)
        run: |
          # We need Theos for the logos preprocessor (%hook/%orig/%ctor syntax)
          export THEOS=/Users/runner/theos
          git clone --recursive --depth 1 https://github.com/theos/theos.git "$THEOS" 2>&1 | tail -5
          echo "THEOS=$THEOS" >> $GITHUB_ENV
          # Verify logos.pl exists
          ls -la "$THEOS/bin/logos.pl" 2>/dev/null || echo "logos.pl not found"
          find "$THEOS" -name "logos*" -type f 2>/dev/null | head -10

      - name: Preprocess Logos and Build dylib
        run: |
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          THEOS=/Users/runner/theos
          mkdir -p build

          echo "SDK: $SDK"
          echo "THEOS: $THEOS"

          # Find and run logos preprocessor
          LOGOS_BIN=$(find "$THEOS" -name "logos.pl" -type f 2>/dev/null | head -1)
          echo "Logos binary: $LOGOS_BIN"

          if [ -z "$LOGOS_BIN" ]; then
            echo "FATAL: logos.pl not found in Theos"
            find "$THEOS/bin" -type f | head -20
            exit 1
          fi

          # Preprocess Tweak.x -> Tweak.mm
          perl "$LOGOS_BIN" ios/UNMHook/Tweak.x > build/Tweak.mm 2>&1
          LOGOS_EXIT=$?
          echo "Logos exit code: $LOGOS_EXIT"
          echo "=== Output (last 30 lines) ==="
          tail -30 build/Tweak.mm
          wc -l build/Tweak.mm

          if [ $LOGOS_EXIT -ne 0 ] || [ ! -s build/Tweak.mm ]; then
            echo "Logos preprocessing failed!"
            exit 1
          fi

          # Compile to dylib
          clang++ \
            -dynamiclib \
            -arch arm64 \
            -isysroot "$SDK" \
            -framework Foundation \
            -framework UIKit \
            -fobjc-arc \
            -fmodules \
            -std=c++17 \
            -install_name "@r/libUNMHook.dylib" \
            -o build/UNMHook.dylib \
            build/Tweak.mm 2>&1

          echo "=== Build result ==="
          file build/UNMHook.dylib
          ls -la build/UNMHook.dylib

      - name: Upload dylib artifact
        uses: actions/upload-artifact@v4
        with:
          name: UNMHook-dylib
          path: build/UNMHook.dylib

      - name: Create Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ios-v2.0.0
          name: "UNMHook v2.0.0 (Native Mode)"
          body: |
            UNMHook v2.0.0 - Native music URL injection, no Node.js/proxy needed.
            
            ## Installation
            ### TrollStore (recommended)
            1. Download UNMHook.dylib
            2. Use inject tool to inject into NeteaseMusic
            3. Kill and restart the app
            
            ### Jailbreak
            1. Copy UNMHook.dylib to /Library/MobileSubstrate/DynamicLibraries/
            2. Copy UNMHook.plist alongside
            3. killall NeteaseMusic
          files: build/UNMHook.dylib
          draft: false
          prerelease: false
