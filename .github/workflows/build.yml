name: Build UNM Suite

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    name: Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x android/dolby_beta_src/gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/dolby_beta_src/**/*.gradle*', 'android/dolby_beta_src/**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Build APK with Gradle
        working-directory: android/dolby_beta_src
        run: ./gradlew app:assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: dolby-beta-apk
          path: android/dolby_beta_src/app/build/outputs/apk/release/*.apk
          if-no-files-found: warn
          retention-days: 30

      - name: Create Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v-build-${{ github.run_number }}
          name: Dolby Beta Build #${{ github.run_number }}
          body: "Automated build from commit ${{ github.sha }}"
          prerelease: true
          files: android/dolby_beta_src/app/build/outputs/apk/release/*.apk

  build-ios:
    name: iOS Tweak (Theos)
    runs-on: macos-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Install Theos
        run: |
          brew install ldid
          git clone --recursive https://github.com/theos/theos.git $HOME/theos
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV

      - name: Download iOS SDK
        run: |
          # Theos may have an empty sdks dir, replace with community SDKs
          rm -rf $HOME/theos/sdks
          git clone --depth=1 https://github.com/theos/sdks.git $HOME/theos/sdks
          # List available SDKs
          ls $HOME/theos/sdks/iPhoneOS*.sdk

      - name: Build UNMHook
        working-directory: ios/UNMHook
        run: |
          make clean && make package FINALPACKAGE=1

      - name: Upload DEB
        uses: actions/upload-artifact@v4
        with:
          name: unmhook-deb
          path: ios/UNMHook/packages/*.deb
          if-no-files-found: warn
          retention-days: 30
